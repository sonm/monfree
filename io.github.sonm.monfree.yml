app-id: io.github.sonm.monfree
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: monfree

tags:
  - proprietary

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: monfree
    buildsystem: simple
    build-commands:
      - |
        if [ " $FLATPAK_ARCH " = " x86_64 " ]; then
          install -D bin/x86_64/monfree /app/bin/monfree
        elif [ " $FLATPAK_ARCH " = " aarch64 " ]; then
          install -D bin/aarch64/monfree /app/bin/monfree
        fi
      - install -D io.github.sonm.monfree.desktop /app/share/applications/io.github.sonm.monfree.desktop
      - install -D MonFree.png /app/share/icons/hicolor/256x256/apps/io.github.sonm.monfree.png
      - install -D io.github.sonm.monfree.metainfo.xml /app/share/metainfo/io.github.sonm.monfree.metainfo.xml
      - install -D LICENSE.txt /app/share/licenses/io.github.sonm.monfree/LICENSE

    sources:
      - type: archive
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/monfree-1.0.0-sources.tar.gz
        sha256: b3a3a9ed64f140b95677fc4c1fad9995e5aaa951c9e4b2505fe13da87f2fefea
        strip-components: 0
